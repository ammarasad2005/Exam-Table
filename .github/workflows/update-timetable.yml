name: Update Timetable Data

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch:

permissions:
  contents: write

# Prevent overlapping runs of this workflow on the same ref
concurrency:
  group: update-timetable-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-timetable:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch-depth 0 can help if you later need rebases/history ops
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Optional: keep only if your script has external dependencies
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping dependency install."
          fi

      - name: Generate timetable.json
        run: python all_courses_schedule.py

      - name: Copy timetable.json to frontend public/data
        run: |
          mkdir -p public/data
          cp timetable.json public/data/timetable.json

      - name: Commit and push if data changed
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/data/timetable.json

          if git diff --staged --quiet; then
            echo "No changes detected — timetable is up to date."
            exit 0
          fi

          git commit -m "chore: auto-update timetable.json [$(date -u +'%Y-%m-%d %H:%M UTC')]"

          # Retry push once after rebase in case branch moved remotely
          if ! git push origin "HEAD:${BRANCH_NAME}"; then
            echo "Initial push failed, attempting rebase and retry..."
            git fetch origin "${BRANCH_NAME}"
            git rebase "origin/${BRANCH_NAME}"
            git push origin "HEAD:${BRANCH_NAME}"
          fi