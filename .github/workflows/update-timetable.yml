name: Update Timetable Data

on:
  # Run every hour at minute 0
  schedule:
    - cron: '0 * * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# Grant the workflow permission to write commits back to the repo
permissions:
  contents: write

jobs:
  update-timetable:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python (pins version for reproducibility)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Run the Python script to regenerate timetable.json
      - name: Generate timetable.json
        run: python3 all_courses_schedule.py

      # 4. Copy the fresh timetable.json into the Next.js public/data folder
      - name: Copy timetable.json to frontend public/data
        run: |
          mkdir -p public/data
          cp timetable.json public/data/timetable.json

      # 5. Only commit and push if something actually changed
      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/timetable.json
          # Check if there is anything new to commit
          if git diff --staged --quiet; then
            echo "No changes detected — timetable is up to date."
          else
            git commit -m "chore: auto-update timetable.json [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Timetable updated and pushed."
          fi
